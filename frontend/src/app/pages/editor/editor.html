<div class="editor-page">
  <div class="editor-toolbar">
    <div class="toolbar-left">
      <button class="btn btn-sm" (click)="goBack()">
        <ng-icon name="heroArrowLeft" size="16"></ng-icon>
        <span>Back</span>
      </button>
      <span class="file-name">{{ fileName }}</span>
      @if (!canWrite) {
        <span class="badge badge-readonly">Read only</span>
      }
    </div>
    <div class="toolbar-right">
      @if (connectedUsers > 1) {
        <span class="users-count">
          <ng-icon name="heroUsers" size="14"></ng-icon>
          {{ connectedUsers }}
        </span>
      }
      <span class="connection-status" [class.connected]="connected">
        {{ connected ? 'Connected' : 'Disconnected' }}
      </span>
      @if (canWrite) {
        <button
          class="btn btn-sm btn-primary"
          (click)="save()"
          [disabled]="saving || !hasUnsavedChanges">
          {{ saving ? 'Saving...' : 'Save' }}
        </button>
      }
    </div>
  </div>

  @if (loading) {
    <div class="loading-state">
      <div class="spinner"></div>
      <span>Loading editor...</span>
    </div>
  } @else {
    <app-milkdown-editor
      [fileId]="fileId"
      [initialContent]="initialContent"
      [readonly]="!canWrite"
      [token]="token"
      [userName]="userName"
      (contentChanged)="onContentChanged()"
      (connectionStatusChanged)="onConnectionStatusChanged($event)"
      (usersChanged)="onUsersChanged($event)"
    />
  }
</div>
