<tr class="group hover:bg-gray-50/50 transition-colors contact-draggable"
    draggable="true"
    data-contact-id="{{ contact.id }}"
    data-contact-name="{{ contact.fn|default:contact.uid|escapejs }}"
    ondragstart="onContactDragStart(event, {{ contact.id }}, '{{ contact.fn|default:contact.uid|escapejs }}')"
    ondragend="onContactDragEnd(event)">
    <td class="px-4 py-1.5">
        <div class="flex items-center gap-2">
            <div class="w-7 h-7 rounded-full bg-brand-100 text-brand-600 flex items-center justify-center text-xs font-medium">
                {{ contact.fn|default:"?"|truncatechars:1 }}
            </div>
            <span class="font-medium text-gray-900 text-sm">{{ contact.fn|default:"(No name)" }}</span>
        </div>
    </td>
    <td class="px-4 py-1.5 text-sm text-gray-500 hidden sm:table-cell">
        {% if contact.email %}
        <a href="mailto:{{ contact.email }}" class="hover:text-brand-600">{{ contact.email }}</a>
        {% else %}&mdash;{% endif %}
    </td>
    <td class="px-4 py-1.5 text-sm text-gray-500 hidden md:table-cell">
        {{ contact.tel|default:"&mdash;" }}
    </td>
    <td class="px-4 py-1.5 text-right">
        {% if can_write %}
        <div class="inline-flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <button type="button" title="Edit"
                    onclick="openEditContact({{ contact.id }}, '{{ contact.fn|default:""|escapejs }}', '{{ contact.email|default:""|escapejs }}', '{{ contact.tel|default:""|escapejs }}', '{{ contact.org|default:""|escapejs }}')"
                    class="rounded p-1 text-gray-400 hover:text-brand-600 hover:bg-brand-50">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
            </button>
            <form method="post" action="{% url 'contact_delete' contact_id=contact.id %}" class="inline"
                  onsubmit="return confirm('Delete contact \'{{ contact.fn|default:"this contact"|escapejs }}\'?')">
                {% csrf_token %}
                <button type="submit" title="Delete"
                        class="rounded p-1 text-gray-400 hover:text-red-600 hover:bg-red-50">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                </button>
            </form>
        </div>
        {% endif %}
    </td>
</tr>
